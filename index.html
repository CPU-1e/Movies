<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Movies - Free Movie Streaming</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">Abdul<span class="logo-highlight">Movies</span></span>
            </a>
            <nav class="nav">
                <a href="#" class="nav-link active" data-category="popular">Popular</a>
                <a href="#" class="nav-link" data-category="top_rated">Top Rated</a>
                <a href="#" class="nav-link" data-category="upcoming">Upcoming</a>
                <a href="#" class="nav-link" data-category="now_playing">Now Playing</a>
            </nav>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search movies..." class="search-input">
                <button id="searchBtn" class="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="main">
        <section class="hero" id="hero">
            <div class="hero-content">
                <h1 class="hero-title" id="heroTitle"></h1>
                <p class="hero-overview" id="heroOverview"></p>
                <div class="hero-meta">
                    <span class="hero-rating" id="heroRating"></span>
                    <span class="hero-year" id="heroYear"></span>
                </div>
                <button class="btn-watch" id="heroWatchBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    Watch Now
                </button>
            </div>
            <div class="hero-overlay"></div>
        </section>

        <section class="movies-section">
            <div class="section-header">
                <h2 class="section-title" id="sectionTitle">Popular Movies</h2>
                <div class="filter-tags" id="genreTags"></div>
            </div>
            <div class="movies-grid" id="moviesGrid"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading movies...</p>
            </div>
            <div class="load-more" id="loadMore">
                <button class="btn-load-more" id="loadMoreBtn">Load More Movies</button>
            </div>
        </section>
    </main>

    <div class="modal" id="movieModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-backdrop" id="modalBackdrop"></div>
            <div class="modal-body">
                <div class="modal-poster">
                    <img id="modalPoster" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <div class="modal-meta">
                        <span class="modal-rating" id="modalRating"></span>
                        <span class="modal-year" id="modalYear"></span>
                        <span class="modal-runtime" id="modalRuntime"></span>
                    </div>
                    <p class="modal-overview" id="modalOverview"></p>
                    <div class="modal-genres" id="modalGenres"></div>
                    <div class="modal-actions">
                        <h3>Watch Options</h3>
                        <div class="streaming-links" id="streamingLinks"></div>
                    </div>
                    <div class="modal-trailer" id="modalTrailer"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 AbdulMovies. All rights reserved.</p>
            <p class="footer-disclaimer">Movie data provided by TMDB. Streaming via free, legal sources.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
