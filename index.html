<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdul Movies - Free Movie Streaming</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo" onclick="goHome(); return false;">
                <svg class="logo-svg" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="36" height="36" rx="8" fill="#111"/>
                    <path d="M10 8h4l4 10 4-10h4v20h-4V14l-4 10-4-10v14h-4V8z" fill="white"/>
                </svg>
                <span class="logo-text">Abdul<span class="logo-highlight">Movies</span></span>
            </a>
            <nav class="nav" id="mainNav">
                <a href="#" class="nav-link active" data-category="popular">Home</a>
                <a href="#" class="nav-link" data-category="top_rated">Top Rated</a>
                <a href="#" class="nav-link" data-category="upcoming">Upcoming</a>
                <a href="#" class="nav-link" data-category="now_playing">Now Playing</a>
            </nav>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search movies..." class="search-input">
                <button id="searchBtn" class="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="main" id="mainContent">
        <!-- Home View -->
        <div id="homeView">
            <section class="hero" id="hero">
                <div class="hero-content">
                    <h1 class="hero-title" id="heroTitle"></h1>
                    <p class="hero-overview" id="heroOverview"></p>
                    <div class="hero-meta">
                        <span class="hero-rating" id="heroRating"></span>
                        <span class="hero-year" id="heroYear"></span>
                    </div>
                    <div class="hero-buttons">
                        <button class="btn-play-now" id="heroPlayBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            Play Now
                        </button>
                        <button class="btn-details" id="heroDetailsBtn">
                            Details →
                        </button>
                    </div>
                </div>
                <div class="hero-overlay"></div>
            </section>

            <section class="movies-section">
                <div class="section-header">
                    <h2 class="section-title" id="sectionTitle">Popular Movies</h2>
                </div>
                <div class="movies-grid" id="moviesGrid"></div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Loading movies...</p>
                </div>
                <div class="load-more" id="loadMore">
                    <button class="btn-load-more" id="loadMoreBtn">Load More Movies</button>
                </div>
            </section>
        </div>

        <!-- Movie Detail View -->
        <div id="movieDetailView" style="display:none;">
            <section class="detail-hero" id="detailHero">
                <div class="detail-hero-content">
                    <h1 class="detail-title" id="detailTitle"></h1>
                    <div class="detail-meta">
                        <span class="detail-rating" id="detailRating"></span>
                        <span class="detail-year" id="detailYear"></span>
                        <span class="detail-runtime" id="detailRuntime"></span>
                    </div>
                    <p class="detail-overview" id="detailOverview"></p>
                    <div class="detail-genres" id="detailGenres"></div>
                    <div class="detail-buttons">
                        <button class="btn-play-now" id="detailPlayBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            Play Now
                        </button>
                    </div>
                </div>
                <div class="detail-hero-overlay"></div>
            </section>

            <section class="movies-section">
                <h2 class="section-title">More Like This</h2>
                <div class="movies-grid" id="similarMoviesGrid"></div>
            </section>
        </div>
    </main>

    <!-- Player Modal -->
    <div class="modal player-modal" id="playerModal">
        <div class="player-content">
            <div class="player-header">
                <h2 class="player-title" id="playerTitle"></h2>
                <div class="player-controls" id="playerControls">
                    <button class="source-btn active">Server 1</button>
                    <button class="player-close" id="playerClose">&times;</button>
                </div>
            </div>
            <div class="episode-controls" id="episodeControls" style="display:none">
                <select id="seasonSelect" class="episode-select"></select>
                <select id="episodeSelect" class="episode-select"></select>
            </div>
            <div class="player-wrapper">
                <iframe id="playerFrame" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>

        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 AbdulMovies. All rights reserved.</p>
            <p class="footer-disclaimer">Movie data from TMDB.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
