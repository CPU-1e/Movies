<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Movies - Free Streaming</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e50914'/><polygon points='40,30 70,50 40,70' fill='white'/></svg>">
</head>
<body>
    <header class="header" id="header">
        <div class="header-inner">
            <a href="#" class="logo" onclick="goHome();return false">
                <svg class="logo-icon" width="28" height="28" viewBox="0 0 100 100" fill="none">
                    <rect width="100" height="100" rx="20" fill="#e50914"/>
                    <polygon points="40,30 70,50 40,70" fill="white"/>
                </svg>
                <span>Movies</span>
            </a>
            <nav class="nav" id="nav">
                <a href="#" class="nav-link active" data-type="movie" data-category="popular">Movies</a>
                <a href="#" class="nav-link" data-type="movie" data-category="top_rated">Top Rated</a>
                <a href="#" class="nav-link" data-type="movie" data-category="upcoming">Upcoming</a>
                <a href="#" class="nav-link" data-type="tv" data-category="popular">TV Shows</a>
                <a href="#" class="nav-link" data-type="tv" data-category="top_rated">TV Top</a>
            </nav>
            <div class="header-actions">
                <button class="search-toggle" id="searchToggle" aria-label="Toggle search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </button>
                <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <div class="search-bar" id="searchBar">
            <input type="text" id="searchInput" placeholder="Search movies & shows..." autocomplete="off">
            <button id="searchClear" class="search-clear" aria-label="Clear search">&times;</button>
        </div>
    </header>

    <main id="main">
        <div id="homeView">
            <section class="hero" id="hero" style="background-image:linear-gradient(135deg,#0f0f0f 0%,#1a1a2e 100%)">
                <div class="hero-gradient"></div>
                <div class="hero-body">
                    <h1 class="hero-title" id="heroTitle">Welcome</h1>
                    <p class="hero-desc" id="heroOverview">Browse popular movies and TV shows</p>
                    <div class="hero-meta" id="heroMeta">
                        <span class="hero-rating" id="heroRating"></span>
                        <span class="hero-year" id="heroYear"></span>
                    </div>
                    <div class="hero-actions">
                        <button class="btn btn-primary" id="heroPlayBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                            Play
                        </button>
                        <button class="btn btn-secondary" id="heroDetailsBtn">Details</button>
                    </div>
                </div>
            </section>

            <section class="section">
                <div class="section-head">
                    <h2 class="section-title" id="sectionTitle">Popular Movies</h2>
                </div>
                <div class="grid" id="moviesGrid"></div>
                <div class="spinner-wrap" id="loading">
                    <div class="spinner"></div>
                </div>
                <div class="load-more" id="loadMore">
                    <button class="btn btn-outline" id="loadMoreBtn">Load More</button>
                </div>
            </section>
        </div>

        <div id="detailView" style="display:none">
            <section class="detail-hero" id="detailHero" style="background-image:linear-gradient(135deg,#0f0f0f 0%,#1a1a2e 100%)">
                <div class="hero-gradient"></div>
                <div class="detail-body">
                    <h1 class="detail-title" id="detailTitle"></h1>
                    <div class="detail-meta" id="detailMeta">
                        <span class="detail-rating" id="detailRating"></span>
                        <span class="detail-year" id="detailYear"></span>
                        <span class="detail-runtime" id="detailRuntime"></span>
                    </div>
                    <p class="detail-desc" id="detailOverview"></p>
                    <div class="detail-tags" id="detailGenres"></div>
                    <button class="btn btn-primary" id="detailPlayBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                        Play
                    </button>
                </div>
            </section>

            <section class="section">
                <h2 class="section-title">More Like This</h2>
                <div class="grid" id="similarGrid"></div>
            </section>
        </div>
    </main>

    <div class="modal" id="playerModal">
        <div class="modal-header">
            <h3 class="modal-title" id="playerTitle">Now Playing</h3>
            <div class="modal-actions" id="serverBtns"></div>
            <button class="modal-close" id="playerClose" aria-label="Close player">&times;</button>
        </div>
        <div class="episode-bar" id="episodeBar" style="display:none">
            <select id="seasonSelect"></select>
            <select id="episodeSelect"></select>
        </div>
        <div class="player-wrap">
            <iframe id="playerFrame" src="" allow="autoplay;encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="ublock-modal" id="ublockModal">
        <div class="ublock-box">
            <button class="ublock-close" id="ublockClose">&times;</button>
            <svg width="48" height="48" viewBox="0 0 64 64" fill="none"><rect width="64" height="64" rx="16" fill="#e50914"/><path d="M32 12L14 20v24l18 8 18-8V20L32 12z" fill="none" stroke="white" stroke-width="2.5"/><path d="M24 30l6 6 10-12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <h2>Ad Blocker Recommended</h2>
            <p>This site works best with <strong>uBlock Origin</strong>. It helps movies and shows load faster.</p>
            <a id="ublockInstallBtn" class="ublock-btn" href="#" target="_blank" rel="noopener">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Install uBlock Origin
            </a>
            <button id="ublockSkip" class="ublock-skip">Continue without ad blocker</button>
            <p class="ublock-browser" id="ublockBrowser"></p>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Movies &middot; Powered by TMDB</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
